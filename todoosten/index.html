<style>
  :root{
    --bg:#0d0a12; --surface:#15101d; --card:#1b1426; --card2:#221a30;
    --border:rgba(180,150,220,.12); --border-bright:rgba(179,136,255,.32);
    --accent:#b388ff; --accent2:#7c4dff;
    --text:#ece6f5; --muted:#9a8bb0; --warn:#ffcc44; --danger:#ff6b8a;
    --q-us:#ff6b6b; --q-uc:#ffb648; --q-ls:#4dd6a0; --q-lc:#6db3ff;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    --serif:Georgia,'Times New Roman',Times,serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--text);font-family:var(--serif);
    overflow-x:hidden;padding-top:var(--safe-top);padding-bottom:var(--safe-bot);line-height:1.3;}
  button,input,textarea,select{font-family:inherit;color:inherit;}
  button{cursor:pointer;border:none;background:none;}
  .hidden{display:none !important;}
  header.topbar{position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,rgba(13,10,18,.98),rgba(13,10,18,.88));
    backdrop-filter:blur(10px);border-bottom:1px solid var(--border);
    padding:10px 14px;display:flex;align-items:center;gap:10px;}
  .brand{font-family:var(--serif);font-weight:bold;font-size:19px;font-style:italic;
    letter-spacing:.01em;color:var(--accent);white-space:nowrap;}
  .spacer{flex:1;}
  .icon-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    border:1px solid var(--border);background:var(--card);color:var(--text);font-size:16px;}
  .icon-btn:active{transform:scale(.93);}
  .me-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;object-position:50% 52%;
    border:1.5px solid var(--border-bright);flex:none;}
  .sync-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:none;transition:background .3s;}
  .sync-dot.ok{background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .sync-dot.busy{background:var(--warn);animation:pulse 1s infinite;}
  .sync-dot.err{background:var(--danger);}
  @keyframes pulse{50%{opacity:.3;}}
  .quickadd{padding:11px 14px 4px;display:flex;flex-direction:column;gap:8px;}
  .qa-row{display:flex;gap:8px;}
  .qa-input{flex:1;background:var(--card);border:1px solid var(--border-bright);border-radius:13px;
    padding:13px;font-size:16px;color:var(--text);min-height:48px;}
  .qa-input:focus{outline:none;border-color:var(--accent);}
  .qa-add{background:var(--accent);color:#15091f;font-weight:bold;border-radius:13px;
    padding:0 18px;font-size:24px;min-width:54px;}
  .qa-add:active{transform:scale(.95);}
  .qa-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  .qa-chips::-webkit-scrollbar{display:none;}
  .chip{flex:none;border:1px solid var(--border);background:var(--surface);border-radius:18px;
    padding:6px 11px;font-size:12px;font-weight:bold;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .chip .dot{width:9px;height:9px;border-radius:3px;}
  .chip.sel{color:var(--text);border-color:currentColor;}
  .chip[data-q="us"].sel{color:var(--q-us);} .chip[data-q="uc"].sel{color:var(--q-uc);}
  .chip[data-q="ls"].sel{color:var(--q-ls);} .chip[data-q="lc"].sel{color:var(--q-lc);}
  .board{padding:8px 12px 24px;display:grid;gap:11px;}
  @media(min-width:760px){.board{grid-template-columns:1fr 1fr;}}
  .quad{background:var(--surface);border:2px solid var(--border);border-radius:15px;
    overflow:hidden;display:flex;flex-direction:column;min-height:64px;}
  .quad[data-q="us"]{border-color:rgba(255,107,107,.55);}
  .quad[data-q="uc"]{border-color:rgba(255,182,72,.55);}
  .quad[data-q="ls"]{border-color:rgba(77,214,160,.55);}
  .quad[data-q="lc"]{border-color:rgba(109,179,255,.55);}
  .quad-head{padding:8px 12px;display:flex;align-items:baseline;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .qnum{font-weight:bold;font-size:13px;border-radius:6px;padding:1px 7px;color:#15091f;}
  .quad[data-q="us"] .qnum{background:var(--q-us);} .quad[data-q="uc"] .qnum{background:var(--q-uc);}
  .quad[data-q="ls"] .qnum{background:var(--q-ls);} .quad[data-q="lc"] .qnum{background:var(--q-lc);}
  .quad-title{font-weight:bold;font-size:16px;letter-spacing:.01em;}
  .quad[data-q="us"] .quad-title{color:var(--q-us);} .quad[data-q="uc"] .quad-title{color:var(--q-uc);}
  .quad[data-q="ls"] .quad-title{color:var(--q-ls);} .quad[data-q="lc"] .quad-title{color:var(--q-lc);}
  .quad-sub{font-size:11px;color:var(--muted);font-style:italic;font-weight:normal;}
  .quad-count{margin-left:auto;font-size:12px;color:var(--muted);font-weight:bold;
    background:var(--card);border-radius:18px;padding:2px 9px;min-width:24px;text-align:center;}
  .tasks{padding:5px;display:flex;flex-direction:column;gap:3px;flex:1;}
  .empty{color:var(--muted);font-size:12px;text-align:center;padding:8px 6px;opacity:.6;font-style:italic;}
  .task{background:var(--card);border:1px solid var(--border);border-radius:9px;
    padding:6px 6px 6px 7px;display:flex;gap:7px;align-items:flex-start;position:relative;}
  .task.done{opacity:.5;}
  .task.done .t-title{text-decoration:line-through;color:var(--muted);}
  .task.grp{background:var(--card2);}
  .task.sel{outline:2px solid var(--accent);outline-offset:-1px;background:rgba(179,136,255,.13);}
  .task.dragging{opacity:.4;}
  .task.dz-before{box-shadow:0 -2px 0 0 var(--accent);}
  .task.dz-after{box-shadow:0 2px 0 0 var(--accent);}
  .task.dz-child{outline:2px dashed var(--accent);outline-offset:-1px;background:rgba(179,136,255,.16);}
  .tasks.dz-root{box-shadow:0 0 0 2px var(--accent) inset;border-radius:9px;}
  .drag-grip{width:14px;flex:none;display:grid;place-items:center;color:var(--muted);
    font-size:13px;cursor:grab;margin-top:2px;opacity:.55;touch-action:none;}
  .selhint{padding:2px 16px 0;font-size:11px;color:var(--accent);font-style:italic;min-height:14px;}
  .caret{width:18px;flex:none;display:grid;place-items:center;font-size:11px;color:var(--muted);margin-top:3px;padding:0;}
  .caret.hidden-caret{visibility:hidden;}
  .check{width:21px;height:21px;border-radius:6px;border:2px solid var(--border-bright);flex:none;
    display:grid;place-items:center;margin-top:1px;font-size:13px;color:#15091f;background:transparent;}
  .task.done .check{background:var(--accent);border-color:var(--accent);}
  .t-body{flex:1;min-width:0;}
  .t-title{font-size:15px;line-height:1.25;word-break:break-word;}
  .t-title.group{font-weight:bold;letter-spacing:.01em;}
  .t-notes{font-size:12.5px;color:var(--muted);margin-top:2px;word-break:break-word;white-space:pre-wrap;}
  .t-notes a{color:var(--accent);}
  .t-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
  .badge{font-size:10.5px;font-weight:bold;border-radius:6px;padding:2px 6px;background:var(--surface);
    color:var(--muted);display:inline-flex;align-items:center;gap:4px;border:1px solid var(--border);}
  .badge.due{color:var(--warn);} .badge.due.over{color:var(--danger);}
  .badge.cal{color:var(--accent);} .badge.kids{color:var(--muted);}
  .menu-btn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;font-size:18px;
    color:var(--muted);flex:none;margin-top:-1px;}
  .menu-btn:active{background:var(--surface);transform:scale(.9);}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;}
  @media(min-width:640px){.scrim{align-items:center;}}
  .sheet{background:var(--surface);border:1px solid var(--border-bright);border-radius:20px 20px 0 0;
    width:100%;max-width:520px;padding:16px 16px calc(18px + var(--safe-bot));max-height:92vh;overflow-y:auto;animation:up .2s ease;}
  @media(min-width:640px){.sheet{border-radius:18px;}}
  @keyframes up{from{transform:translateY(26px);opacity:.6;}}
  .sheet h2{font-size:17px;font-weight:bold;margin-bottom:12px;color:var(--accent);}
  .sheet h2 .sub{display:block;font-size:12px;color:var(--muted);font-weight:normal;font-style:italic;margin-top:2px;}
  .field{margin-bottom:11px;}
  .field label{display:block;font-size:11px;font-weight:bold;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
  .field input,.field textarea,.field select{width:100%;background:var(--card);border:1px solid var(--border-bright);border-radius:10px;padding:12px;font-size:16px;}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:60px;}
  .q-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .q-opt{border:1px solid var(--border);border-radius:10px;padding:9px;text-align:left;display:flex;flex-direction:column;gap:2px;background:var(--card);}
  .q-opt .qt{font-weight:bold;font-size:12.5px;display:flex;align-items:center;gap:6px;}
  .q-opt .qs{font-size:10px;color:var(--muted);font-style:italic;}
  .q-opt .dot{width:10px;height:10px;border-radius:3px;}
  .q-opt.sel{border-color:currentColor;}
  .q-opt[data-q="us"].sel{color:var(--q-us);} .q-opt[data-q="uc"].sel{color:var(--q-uc);}
  .q-opt[data-q="ls"].sel{color:var(--q-ls);} .q-opt[data-q="lc"].sel{color:var(--q-lc);}
  .sheet-actions{display:flex;gap:9px;margin-top:6px;}
  .btn{flex:1;border-radius:11px;padding:13px;font-weight:bold;font-size:15px;text-align:center;}
  .btn-primary{background:var(--accent);color:#15091f;}
  .btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--text);}
  .btn-danger{background:rgba(255,107,138,.13);color:var(--danger);border:1px solid rgba(255,107,138,.32);}
  .btn:active{transform:scale(.97);}
  .hint{font-size:11.5px;color:var(--muted);line-height:1.5;margin-top:4px;font-style:italic;}
  /* action menu list */
  .menu-list{display:flex;flex-direction:column;gap:2px;}
  .menu-item{display:flex;align-items:center;gap:11px;padding:13px 10px;border-radius:10px;font-size:15px;text-align:left;width:100%;}
  .menu-item:active{background:var(--card);}
  .menu-item .ic{width:22px;text-align:center;font-size:16px;color:var(--accent);}
  .menu-item.danger{color:var(--danger);} .menu-item.danger .ic{color:var(--danger);}
  .menu-sep{height:1px;background:var(--border);margin:5px 2px;}
  .movebox{display:flex;align-items:center;gap:8px;padding:8px 8px;border-radius:10px;background:var(--card);margin-bottom:5px;}
  .movebox .nm{flex:1;font-weight:bold;font-size:13.5px;}
  .movebox .mb{border:1px solid var(--border-bright);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:bold;color:var(--accent);}
  .movebox .mb:active{background:var(--surface);}
  .login{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:26px;gap:16px;text-align:center;}
  .login h1{font-family:var(--serif);font-weight:bold;font-style:italic;font-size:30px;color:var(--accent);}
  .login p{color:var(--muted);font-size:13px;max-width:300px;line-height:1.5;font-style:italic;}
  .login form{width:100%;max-width:340px;display:flex;flex-direction:column;gap:11px;}
  .toast{position:fixed;left:50%;bottom:calc(20px + var(--safe-bot));transform:translateX(-50%);
    background:var(--card);border:1px solid var(--border-bright);color:var(--text);padding:11px 16px;
    border-radius:13px;font-size:13px;z-index:80;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:92vw;
    display:flex;align-items:center;gap:12px;}
  .toast.err{border-color:var(--danger);color:var(--danger);}
  .toast .ta{color:var(--accent);font-weight:bold;white-space:nowrap;border:1px solid var(--border-bright);border-radius:9px;padding:6px 11px;}
  .footbar{display:flex;align-items:center;gap:8px;padding:4px 16px 80px;}
  .footbar .sw{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px;}
  .footbar input{accent-color:var(--accent);width:17px;height:17px;}
</style>
</head>

    <button class="btn btn-primary" type="submit">Unlock &amp; Sync</button>
    <div class="hint" id="loginHint"></div>
  </form>

<script>
const QUADRANTS = [
  { id:'us', num:1, title:'Do First',       sub:'Urgent · Simple',     color:'var(--q-us)' },
  { id:'uc', num:2, title:'Block Time',     sub:'Urgent · Complex',    color:'var(--q-uc)' },
  { id:'ls', num:3, title:'Quick Wins',     sub:'Long-term · Simple',  color:'var(--q-ls)' },
  { id:'lc', num:4, title:'Plan / Project', sub:'Long-term · Complex', color:'var(--q-lc)' },
];
const QMAP = Object.fromEntries(QUADRANTS.map(q=>[q.id,q]));
const LS = { pass:'todo_pass', cache:'todo_cache', queue:'todo_queue', quad:'todo_last_quad', hide:'todo_hide_done' };
const REQUIRE_PASS = false;
const EXEC_URL = "https://script.google.com/macros/s/AKfycbzFmRGU1spQhMAbbV8fgWP59GD8uPX6fg3joeaATZUullmtURAYAEJNAc3T3bLyvNo/exec";

let state = {
  tasks: [],
  pass: localStorage.getItem(LS.pass) || '',
  quad: localStorage.getItem(LS.quad) || 'us',
  hideDone: true,        // always start with completed hidden
  selected: new Set(),   // selected task ids
  anchor: null,          // last clicked id (for shift-range + keyboard)
  flat: [],              // ids in current visual order
};

function setSync(s){ document.getElementById('syncDot').className = 'sync-dot ' + (s||''); }

/* ---- server bridge (fetch to Apps Script /exec; text/plain avoids CORS preflight) ---- */
function post(body){
  return fetch(EXEC_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(body) }).then(r=>r.json());
}
async function api(action, payload){
  payload = payload || {}; const pass = state.pass || '';
  switch(action){
    case 'list':     return post({ action:'list', pass });
    case 'add':      return post({ action:'add', pass, task:payload.task });
    case 'update':   return post({ action:'update', pass, id:payload.id, fields:payload.fields });
    case 'delete':   return post({ action:'delete', pass, id:payload.id });
    case 'reorder':  return post({ action:'reorder', pass, updates:payload.updates });
    case 'calendar': return post({ action:'calendar', pass, id:payload.id, start:payload.start, minutes:payload.minutes });
    default:         return { ok:false, error:'unknown' };
  }
}

/* ---- offline queue ---- */
function getQueue(){ try{return JSON.parse(localStorage.getItem(LS.queue)||'[]');}catch(e){return [];} }
function setQueue(q){ localStorage.setItem(LS.queue, JSON.stringify(q)); }
function enqueue(action, payload){ const q=getQueue(); q.push({action,payload}); setQueue(q); }
async function flushQueue(){
  let q = getQueue(); if(!q.length) return;
  const rest = [];
  for(const op of q){ try{ await api(op.action, op.payload); }catch(e){ rest.push(op); } }
  setQueue(rest);
}
function saveCache(){ localStorage.setItem(LS.cache, JSON.stringify(state.tasks)); }
function loadCache(){ try{ state.tasks = JSON.parse(localStorage.getItem(LS.cache)||'[]'); }catch(e){ state.tasks=[]; } }
function newId(){ return (window.crypto&&crypto.randomUUID)?('c-'+crypto.randomUUID()):('c-'+Date.now()+'-'+Math.random().toString(36).slice(2)); }

async function pushOp(action, payload){
  setSync('busy');
  try{
    const r = await api(action, payload);
    if(r && r.error==='auth'){ setSync('err'); toast('Wrong password — check Settings','err'); return; }
    await flushQueue(); setSync('ok');
  }catch(e){ enqueue(action, payload); setSync('err'); }
}

/* ---- tree helpers ---- */
function childrenOf(id){ return state.tasks.filter(t=>(t.parentId||'')===id).sort((a,b)=>a.sort-b.sort); }
function rootsOf(quad){ return state.tasks.filter(t=>!t.parentId && t.quadrant===quad).sort((a,b)=>a.sort-b.sort); }
function hasKids(id){ return state.tasks.some(t=>(t.parentId||'')===id); }
function siblingsOf(t){
  return t.parentId ? state.tasks.filter(x=>x.parentId===t.parentId && x.id!==t.id)
                    : state.tasks.filter(x=>!x.parentId && x.quadrant===t.quadrant && x.id!==t.id);
}
function descendants(id){
  let out=[], q=[id];
  while(q.length){ const c=q.shift(); childrenOf(c).forEach(k=>{ out.push(k); q.push(k.id); }); }
  return out;
}
function anyOpen(t){ if(!t.done) return true; return descendants(t.id).some(d=>!d.done); }

/* ---- tidy pasted text (light; Claude does the heavy lifting) ---- */
function tidy(s){
  s = String(s||'').replace(/ /g,' ').replace(/[ \t]+/g,' ').trim();
  s = s.replace(/^[\-\*•·§▪◦\d.\)\s]+/, '').trim();
  return s;
}

/* ---- local mutations ---- */
function placeSort(parentId, quad, atTop){
  const sib = parentId ? state.tasks.filter(t=>t.parentId===parentId)
                       : state.tasks.filter(t=>!t.parentId && t.quadrant===quad);
  if(!sib.length) return Date.now();
  const sorts = sib.map(t=>t.sort);
  return atTop ? Math.min(...sorts)-1000 : Math.max(...sorts)+1000;
}
function addTaskLocal(rawTitle, quad, parentId, atTop){
  const lines = String(rawTitle).split(/\n/).map(x=>tidy(x)).filter(Boolean);
  const title = lines[0] || tidy(rawTitle);
  const notes = lines.slice(1).join('\n');
  const t = { id:newId(), title, notes, quadrant:quad, sort:placeSort(parentId,quad,atTop!==false),
    done:false, due:'', calendarEventId:'', calendarLink:'',
    parentId:parentId||'', collapsed:false, created:new Date().toISOString(), updated:new Date().toISOString() };
  state.tasks.push(t); saveCache(); render();
  pushOp('add', { task:t });
  offerCalendar(t);
  return t;
}
function updateTaskLocal(id, fields){
  const t = state.tasks.find(x=>x.id===id); if(!t) return;
  Object.assign(t, fields, { updated:new Date().toISOString() });
  saveCache(); render();
  pushOp('update', { id, fields });
}
function deleteTaskLocal(id){
  const kill = new Set([id, ...descendants(id).map(d=>d.id)]);
  state.tasks = state.tasks.filter(x=>!kill.has(x.id)); saveCache(); render();
  pushOp('delete', { id });
}

/* ---- priority / move ops ---- */
function toTop(t){ const sib=siblingsOf(t); const min=sib.length?Math.min(...sib.map(s=>s.sort)):0; updateTaskLocal(t.id,{sort:min-1000}); }
function toBottom(t){ const sib=siblingsOf(t); const max=sib.length?Math.max(...sib.map(s=>s.sort)):0; updateTaskLocal(t.id,{sort:max+1000}); }
function moveToBox(t, quad, atTop){
  const roots = state.tasks.filter(x=>!x.parentId && x.quadrant===quad && x.id!==t.id);
  const sorts = roots.map(r=>r.sort);
  const sort = !roots.length ? Date.now() : (atTop ? Math.min(...sorts)-1000 : Math.max(...sorts)+1000);
  updateTaskLocal(t.id, { parentId:'', quadrant:quad, sort });
}

/* ---- date detection -> calendar offer ---- */
const MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function detectDate(text){
  const s = String(text||'').toLowerCase();
  let m = s.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
  if(m){ const mo=+m[1]-1, day=+m[2]; let yr=m[3]?+m[3]:(new Date()).getFullYear(); if(yr<100) yr+=2000;
    const d=new Date(yr,mo,day,9,0,0); if(!isNaN(d)) return d; }
  m = s.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s*(\d{1,2})\b/);
  if(m){ const mo=MONTHS[m[1]], day=+m[2]; const now=new Date(); let yr=now.getFullYear();
    const d=new Date(yr,mo,day,9,0,0); if(d<now) d.setFullYear(yr+1); if(!isNaN(d)) return d; }
  return null;
}
function offerCalendar(t){
  if(t.calendarEventId) return;
  const d = detectDate(t.title+' '+(t.notes||''));
  if(!d) return;
  toastAction('“'+shorten(t.title)+'” looks dated', 'Add to calendar', ()=>openCalendar(t, d.toISOString()));
}

/* ---- rendering ---- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function linkify(s){ return escapeHtml(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">link</a>'); }
function shorten(s){ s=String(s); return s.length>34?s.slice(0,32)+'…':s; }
function fmtDue(iso){
  if(!iso) return null; const d=new Date(iso); if(isNaN(d)) return null;
  const over=d<new Date();
  let s=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  if(d.getHours()||d.getMinutes()) s+=' '+d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  return { text:s, over };
}

function render(){
  const board=document.getElementById('board'); board.innerHTML=''; state.flat=[];
  document.getElementById('countAll').textContent = state.tasks.filter(t=>!t.done && !t.parentId).length + ' open';
  for(const q of QUADRANTS){
    const quad=document.createElement('section'); quad.className='quad'; quad.dataset.q=q.id;
    const openCount=rootsOf(q.id).filter(t=>!t.done).length;
    quad.innerHTML =
      `<div class="quad-head">
        <span class="qnum">${q.num}</span>
        <span class="quad-title">${q.title}</span>
        <span class="quad-sub">${q.sub}</span>
        <span class="quad-count">${openCount}</span>
      </div><div class="tasks"></div>`;
    const list=quad.querySelector('.tasks'); list.dataset.q=q.id;
    const roots=rootsOf(q.id).filter(t=> state.hideDone ? anyOpen(t) : true );
    if(!roots.length){ const e=document.createElement('div'); e.className='empty'; e.textContent='— empty —'; list.appendChild(e); }
    roots.forEach(t=> renderNode(t,0,list));
    setupRootDrop(list, q.id);
    board.appendChild(quad);
  }
  updateSelHint();
}
function renderNode(t, depth, container){
  state.flat.push(t.id);
  container.appendChild(taskEl(t, depth));
  if(hasKids(t.id) && !t.collapsed){
    childrenOf(t.id).filter(c=> state.hideDone ? anyOpen(c) : true ).forEach(c=> renderNode(c, depth+1, container));
  }
}
function taskEl(t, depth){
  const kids=hasKids(t.id);
  const el=document.createElement('div');
  el.className='task'+(t.done?' done':'')+(kids?' grp':'')+(state.selected.has(t.id)?' sel':'');
  el.style.marginLeft=(depth*15)+'px';
  el.dataset.id=t.id; el.draggable=true;
  const due=fmtDue(t.due); const meta=[];
  if(due) meta.push(`<span class="badge due ${due.over&&!t.done?'over':''}">⏰ ${escapeHtml(due.text)}</span>`);
  if(t.calendarEventId) meta.push(`<span class="badge cal">📅 calendar</span>`);
  if(kids && t.collapsed){ const n=childrenOf(t.id).length; meta.push(`<span class="badge kids">▸ ${n} hidden</span>`); }
  el.innerHTML =
    `<span class="drag-grip" title="Drag">⠿</span>
     <button class="caret ${kids?'':'hidden-caret'}">${kids?(t.collapsed?'▸':'▾'):''}</button>
     <button class="check" aria-label="done">${t.done?'✓':''}</button>
     <div class="t-body">
       <div class="t-title ${kids?'group':''}">${linkify(t.title)||'<span style="color:var(--muted)">(untitled)</span>'}</div>
       ${t.notes?`<div class="t-notes">${linkify(t.notes)}</div>`:''}
       ${meta.length?`<div class="t-meta">${meta.join('')}</div>`:''}
     </div>
     <button class="menu-btn" aria-label="actions">⋮</button>`;
  el.querySelector('.caret').onclick=(e)=>{ e.stopPropagation(); if(kids) updateTaskLocal(t.id,{collapsed:!t.collapsed}); };
  el.querySelector('.check').onclick=(e)=>{ e.stopPropagation(); updateTaskLocal(t.id,{done:!t.done}); };
  el.querySelector('.menu-btn').onclick=(e)=>{ e.stopPropagation(); openActions(t); };
  el.onclick=(e)=>{ selectClick(t.id, e); };
  el.ondblclick=(e)=>{ e.preventDefault(); openEdit(t); };
  el.addEventListener('dragstart', e=> onDragStart(e, t.id));
  el.addEventListener('dragover', e=> onDragOver(e, el));
  el.addEventListener('dragleave', ()=> clearDz(el));
  el.addEventListener('drop', e=> onDrop(e, t.id, el));
  el.addEventListener('dragend', onDragEnd);
  return el;
}

/* ---- selection ---- */
function task(id){ return state.tasks.find(x=>x.id===id); }
function selectClick(id, e){
  if(e && (e.metaKey||e.ctrlKey)){
    if(state.selected.has(id)) state.selected.delete(id); else state.selected.add(id);
    state.anchor=id;
  } else if(e && e.shiftKey && state.anchor){
    const a=state.flat.indexOf(state.anchor), b=state.flat.indexOf(id);
    if(a>=0&&b>=0){ const lo=Math.min(a,b), hi=Math.max(a,b); for(let i=lo;i<=hi;i++) state.selected.add(state.flat[i]); }
  } else { state.selected=new Set([id]); state.anchor=id; }
  render();
}
function clearSelection(){ if(state.selected.size){ state.selected.clear(); state.anchor=null; render(); } }
function updateSelHint(){
  const h=document.getElementById('selHint'); if(!h) return;
  const n=state.selected.size;
  h.textContent = n? `${n} selected — Tab indent · Shift+Tab outdent · drag to move · Esc clear` : '';
}
function selVisualOrder(){ return state.flat.filter(id=>state.selected.has(id)); }
function ancestorsOf(id){ const out=[]; let t=task(id); while(t&&t.parentId){ out.push(t.parentId); t=task(t.parentId); } return out; }
function isDescendant(id, ofId){ return ancestorsOf(id).includes(ofId); }
function topLevelSel(ids){ const set=new Set(ids); return ids.filter(id=> !ancestorsOf(id).some(a=>set.has(a))); }
function prevSibling(t){
  const sibs=(t.parentId? state.tasks.filter(x=>x.parentId===t.parentId)
                        : state.tasks.filter(x=>!x.parentId && x.quadrant===t.quadrant)).sort((a,b)=>a.sort-b.sort);
  const i=sibs.findIndex(x=>x.id===t.id); return i>0? sibs[i-1] : null;
}
function childMaxSort(pid){ const ch=state.tasks.filter(x=>x.parentId===pid); return ch.length? Math.max(...ch.map(c=>c.sort)) : 0; }
function rootMaxSort(quad){ const r=state.tasks.filter(x=>!x.parentId&&x.quadrant===quad); return r.length?Math.max(...r.map(x=>x.sort)):0; }

/* ---- batch update (one server round-trip) ---- */
function applyUpdates(updates){
  updates.forEach(u=>{ const t=task(u.id); if(!t) return;
    if('parentId' in u) t.parentId=u.parentId;
    if('quadrant' in u) t.quadrant=u.quadrant;
    if('sort' in u) t.sort=u.sort;
    if('collapsed' in u) t.collapsed=u.collapsed;
    t.updated=new Date().toISOString();
  });
  saveCache(); render();
  pushReorder(updates);
}
async function pushReorder(updates){
  setSync('busy');
  try{ const r=await api('reorder',{updates});
    if(r&&r.error==='auth'){ setSync('err'); toast('Wrong password — check Settings','err'); return; }
    await flushQueue(); setSync('ok');
  }catch(e){ enqueue('reorder',{updates}); setSync('err'); }
}

/* ---- indent / outdent (Tab / Shift+Tab) ---- */
function indentSelected(){
  const ids=topLevelSel(selVisualOrder()); if(!ids.length) return;
  const np=prevSibling(task(ids[0]));
  if(!np){ toast('Nothing above to nest under','err'); return; }
  let base=childMaxSort(np.id); const updates=[{id:np.id, collapsed:false}];
  ids.forEach(id=>{ base+=1000; updates.push({id, parentId:np.id, quadrant:np.quadrant, sort:base}); });
  applyUpdates(updates);
}
function outdentSelected(){
  const ids=topLevelSel(selVisualOrder()); if(!ids.length) return;
  const updates=[]; let k=1;
  ids.forEach(id=>{ const t=task(id); if(!t.parentId) return; const p=task(t.parentId);
    updates.push({id, parentId:p.parentId||'', quadrant:p.quadrant, sort:p.sort + (k++)*0.001}); });
  if(updates.length) applyUpdates(updates); else toast('Already top-level','err');
}

/* ---- drag & drop ---- */
let dragState=null;
function onDragStart(e, id){
  if(!state.selected.has(id)){ state.selected=new Set([id]); state.anchor=id; render(); }
  dragState={ ids: topLevelSel(selVisualOrder()) };
  e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', id);
  setTimeout(()=>document.querySelectorAll('.task').forEach(el=>{ if(state.selected.has(el.dataset.id)) el.classList.add('dragging'); }),0);
}
function onDragEnd(){ dragState=null;
  document.querySelectorAll('.task').forEach(el=>{ el.classList.remove('dragging'); clearDz(el); });
  document.querySelectorAll('.tasks').forEach(l=>l.classList.remove('dz-root')); }
function clearDz(el){ el.classList.remove('dz-before','dz-after','dz-child'); }
function dropZone(e, el){ const r=el.getBoundingClientRect(); const y=e.clientY-r.top, h=r.height; return y<h*0.3?'before':(y>h*0.7?'after':'child'); }
function invalidTarget(tid){ return dragState.ids.includes(tid) || dragState.ids.some(id=>isDescendant(tid,id)); }
function onDragOver(e, el){
  if(!dragState) return; const tid=el.dataset.id; if(invalidTarget(tid)) return;
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  const z=dropZone(e, el); clearDz(el);
  el.classList.add(z==='before'?'dz-before':z==='after'?'dz-after':'dz-child');
}
function onDrop(e, tid, el){
  if(!dragState) return; e.preventDefault(); e.stopPropagation();
  const z=dropZone(e, el); const ids=dragState.ids; clearDz(el);
  if(!invalidTarget(tid)) moveItems(ids, tid, z);
}
function setupRootDrop(list, quad){
  list.addEventListener('dragover', e=>{ if(!dragState||e.target!==list) return; e.preventDefault(); list.classList.add('dz-root'); });
  list.addEventListener('dragleave', e=>{ if(e.target===list) list.classList.remove('dz-root'); });
  list.addEventListener('drop', e=>{ if(!dragState||e.target!==list) return; e.preventDefault(); list.classList.remove('dz-root'); moveToRoot(dragState.ids, quad); });
}
function moveItems(ids, targetId, zone){
  const target=task(targetId); const updates=[];
  if(zone==='child'){
    let base=childMaxSort(target.id); updates.push({id:target.id, collapsed:false});
    ids.forEach(id=>{ base+=1000; updates.push({id, parentId:target.id, quadrant:target.quadrant, sort:base}); });
  } else {
    const parentId=target.parentId||'', quad=target.quadrant, movedSet=new Set(ids);
    const sibs=(parentId? state.tasks.filter(x=>x.parentId===parentId)
                        : state.tasks.filter(x=>!x.parentId && x.quadrant===quad))
               .filter(x=>!movedSet.has(x.id)).sort((a,b)=>a.sort-b.sort);
    const ti=sibs.findIndex(x=>x.id===targetId);
    let lo,hi;
    if(zone==='before'){ hi=target.sort; lo=ti>0? sibs[ti-1].sort : hi-1000; }
    else { lo=target.sort; hi=ti<sibs.length-1? sibs[ti+1].sort : lo+1000; }
    const step=(hi-lo)/(ids.length+1);
    ids.forEach((id,i)=> updates.push({id, parentId, quadrant:quad, sort:lo+step*(i+1)}));
  }
  applyUpdates(updates);
}
function moveToRoot(ids, quad){
  let base=rootMaxSort(quad); const updates=[];
  ids.forEach(id=>{ base+=1000; updates.push({id, parentId:'', quadrant:quad, sort:base}); });
  applyUpdates(updates);
}

/* ---- chips / quick add ---- */
function renderChips(){
  const wrap=document.getElementById('qaChips'); wrap.innerHTML='';
  for(const q of QUADRANTS){
    const c=document.createElement('button');
    c.className='chip'+(state.quad===q.id?' sel':''); c.dataset.q=q.id;
    c.innerHTML=`<span class="dot" style="background:${q.color}"></span>${q.num}· ${q.title}`;
    c.onclick=()=>{ state.quad=q.id; localStorage.setItem(LS.quad,q.id); renderChips(); };
    wrap.appendChild(c);
  }
}
function doQuickAdd(){
  const inp=document.getElementById('qaInput'); const v=inp.value.trim(); if(!v) return;
  addTaskLocal(v, state.quad, '', true); inp.value=''; inp.focus();
}

/* ---- modals ---- */
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }
function modal(html){
  const root=document.getElementById('modalRoot');
  root.innerHTML=`<div class="scrim" id="scrim"><div class="sheet">${html}</div></div>`;
  document.getElementById('scrim').addEventListener('click',e=>{ if(e.target.id==='scrim') closeModal(); });
}
function quadPicker(sel){
  return `<div class="q-grid">${QUADRANTS.map(q=>`
    <button type="button" class="q-opt${q.id===sel?' sel':''}" data-q="${q.id}">
      <span class="qt"><span class="dot" style="background:${q.color}"></span>${q.num}· ${q.title}</span>
      <span class="qs">${q.sub}</span></button>`).join('')}</div>`;
}

/* ---- action menu (right-side ⋮) ---- */
function openActions(t){
  const kids=hasKids(t.id);
  modal(`
    <h2>${escapeHtml(shorten(t.title))||'Task'}<span class="sub">${QMAP[t.quadrant].num}· ${QMAP[t.quadrant].title}${t.parentId?' · sub-item':''}</span></h2>
    <div class="menu-list" id="mList">
      <button class="menu-item" data-a="top"><span class="ic">⤒</span> Highest priority (top of box)</button>
      <button class="menu-item" data-a="bottom"><span class="ic">⤓</span> Lowest priority (bottom of box)</button>
      ${kids?`<button class="menu-item" data-a="collapse"><span class="ic">${t.collapsed?'▾':'▸'}</span> ${t.collapsed?'Show':'Hide'} sub-items</button>`:''}
      <button class="menu-item" data-a="sub"><span class="ic">＋</span> Add sub-item</button>
      <button class="menu-item" data-a="edit"><span class="ic">✎</span> Edit</button>
      <button class="menu-item" data-a="cal"><span class="ic">📅</span> Add to Google Calendar</button>
      <button class="menu-item" data-a="move"><span class="ic">⇄</span> Move to another box…</button>
      <div class="menu-sep"></div>
      <button class="menu-item danger" data-a="del"><span class="ic">🗑</span> Delete${kids?' (with sub-items)':''}</button>
    </div>`);
  document.getElementById('mList').onclick=(e)=>{
    const b=e.target.closest('.menu-item'); if(!b) return; const a=b.dataset.a;
    if(a==='top'){ toTop(t); closeModal(); }
    else if(a==='bottom'){ toBottom(t); closeModal(); }
    else if(a==='collapse'){ updateTaskLocal(t.id,{collapsed:!t.collapsed}); closeModal(); }
    else if(a==='sub'){ openAddSub(t); }
    else if(a==='edit'){ openEdit(t); }
    else if(a==='cal'){ openCalendar(t); }
    else if(a==='move'){ openMove(t); }
    else if(a==='del'){ if(confirm('Delete “'+t.title+'”'+(kids?' and its sub-items?':'?'))){ deleteTaskLocal(t.id); closeModal(); } }
  };
}
function openMove(t){
  modal(`
    <h2>Move “${escapeHtml(shorten(t.title))}”<span class="sub">choose a box & priority</span></h2>
    ${QUADRANTS.filter(q=>q.id!==t.quadrant||t.parentId).map(q=>`
      <div class="movebox">
        <span class="nm" style="color:${q.color}">${q.num}· ${q.title}</span>
        <button class="mb" data-q="${q.id}" data-top="1">⤒ Top</button>
        <button class="mb" data-q="${q.id}" data-top="0">⤓ Bottom</button>
      </div>`).join('')}
    <div class="sheet-actions"><button class="btn btn-ghost" id="mCancel">Cancel</button></div>`);
  document.querySelectorAll('.movebox .mb').forEach(b=> b.onclick=()=>{ moveToBox(t, b.dataset.q, b.dataset.top==='1'); closeModal(); });
  document.getElementById('mCancel').onclick=closeModal;
}
function openAddSub(parent){
  modal(`
    <h2>Add sub-item<span class="sub">under “${escapeHtml(shorten(parent.title))}”</span></h2>
    <div class="field"><textarea id="subTitle" placeholder="Sub-task… (paste is auto-trimmed)"></textarea></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="subCancel">Cancel</button>
      <button class="btn btn-primary" id="subAdd">Add</button>
    </div>`);
  const go=()=>{ const v=document.getElementById('subTitle').value.trim(); if(!v){closeModal();return;}
    if(parent.collapsed) updateTaskLocal(parent.id,{collapsed:false});
    addTaskLocal(v, parent.quadrant, parent.id, false); closeModal(); };
  document.getElementById('subAdd').onclick=go;
  document.getElementById('subCancel').onclick=closeModal;
  setTimeout(()=>document.getElementById('subTitle').focus(),50);
}
function openEdit(t){
  modal(`
    <h2>Edit</h2>
    <div class="field"><label>Task</label><input id="eTitle" value="${escapeHtml(t.title)}"/></div>
    <div class="field"><label>Notes</label><textarea id="eNotes" placeholder="Details…">${escapeHtml(t.notes||'')}</textarea></div>
    ${t.parentId?'':`<div class="field"><label>Box</label>${quadPicker(t.quadrant)}</div>`}
    <div class="field"><label>Due (optional)</label><input id="eDue" type="datetime-local" value="${t.due?toLocalInput(t.due):''}"/></div>
    <div class="sheet-actions">
      <button class="btn btn-danger" id="eDel">Delete</button>
      <button class="btn btn-primary" id="eSave">Save</button>
    </div>`);
  let q=t.quadrant;
  document.querySelectorAll('.q-opt').forEach(o=>o.onclick=()=>{ q=o.dataset.q;
    document.querySelectorAll('.q-opt').forEach(x=>x.classList.remove('sel')); o.classList.add('sel'); });
  document.getElementById('eSave').onclick=()=>{
    const dueVal=document.getElementById('eDue').value;
    updateTaskLocal(t.id,{ title:document.getElementById('eTitle').value.trim(),
      notes:document.getElementById('eNotes').value, quadrant:t.parentId?t.quadrant:q,
      due:dueVal? new Date(dueVal).toISOString():'' });
    closeModal();
  };
  document.getElementById('eDel').onclick=()=>{ if(confirm('Delete this task?')){ deleteTaskLocal(t.id); closeModal(); } };
  setTimeout(()=>document.getElementById('eTitle').focus(),50);
}
function openCalendar(t, defStart){
  const def = defStart ? toLocalInput(defStart) : (t.due ? toLocalInput(t.due) : toLocalInput(defaultEventTime()));
  modal(`
    <h2>Add to Google Calendar<span class="sub">“${escapeHtml(shorten(t.title))}”</span></h2>
    <div class="field"><label>Start</label><input id="cStart" type="datetime-local" value="${def}"/></div>
    <div class="field"><label>Length (minutes)</label><input id="cMin" type="number" min="5" step="5" value="30"/></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cCancel">Cancel</button>
      <button class="btn btn-primary" id="cGo">Create event</button>
    </div>`);
  document.getElementById('cCancel').onclick=closeModal;
  document.getElementById('cGo').onclick=async ()=>{
    const startVal=document.getElementById('cStart').value;
    const min=parseInt(document.getElementById('cMin').value,10)||30;
    if(!startVal){ toast('Pick a start time','err'); return; }
    const startIso=new Date(startVal).toISOString();
    closeModal(); setSync('busy'); toast('Creating event…');
    try{
      const r=await api('calendar',{ id:t.id, start:startIso, minutes:min });
      if(r && r.ok){ updateTaskLocal(t.id,{calendarEventId:r.eventId||'set', due:startIso}); setSync('ok'); toast('✓ Added to Google Calendar'); }
      else { setSync('err'); toast(r&&r.error==='no_calendar'?'Calendar not found':'Could not create event','err'); }
    }catch(e){ setSync('err'); toast('Network error — try again','err'); }
  };
}
function openSettings(){
  modal(`
    <h2>Settings</h2>
    <div class="field"><label>Password</label><input id="sPass" type="password" value="${escapeHtml(state.pass)}"/></div>
    <div class="sheet-actions">
      <button class="btn btn-danger" id="sOut">Log out</button>
      <button class="btn btn-primary" id="sSave">Save</button>
    </div>
    <p class="hint">Data lives in your Google Sheet. Install: open this page → Share → Add to Home Screen.</p>`);
  document.getElementById('sSave').onclick=()=>{ state.pass=document.getElementById('sPass').value;
    localStorage.setItem(LS.pass, state.pass); closeModal(); refresh(); };
  document.getElementById('sOut').onclick=()=>{ if(confirm('Log out on this device?')){ localStorage.removeItem(LS.pass); location.reload(); } };
}

/* ---- misc ---- */
function toLocalInput(iso){ const d=new Date(iso); if(isNaN(d)) return ''; const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }
function defaultEventTime(){ const d=new Date(); d.setHours(d.getHours()+1,0,0,0); return d.toISOString(); }
let toastTimer;
function toast(msg,type){ const root=document.getElementById('toastRoot');
  root.innerHTML=`<div class="toast ${type||''}">${escapeHtml(msg)}</div>`;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>root.innerHTML='',2600); }
function toastAction(msg,label,cb){ const root=document.getElementById('toastRoot');
  root.innerHTML=`<div class="toast"><span>${escapeHtml(msg)}</span><button class="ta" id="taBtn">${escapeHtml(label)}</button></div>`;
  document.getElementById('taBtn').onclick=()=>{ root.innerHTML=''; cb(); };
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>root.innerHTML='',6000); }

/* ---- sync ---- */
async function refresh(silent){
  if(!silent) setSync('busy');
  try{
    await flushQueue();
    const data = await api('list', {});
    if(data && data.ok){
      const serverIds=new Set(data.tasks.map(t=>t.id));
      const pending=getQueue().length>0;
      const localOnly=pending?state.tasks.filter(t=>!serverIds.has(t.id)):[];
      state.tasks=data.tasks.concat(localOnly);
      saveCache(); render(); setSync('ok');
    } else if(data && data.error==='auth'){ setSync('err'); toast('Wrong password — check Settings','err'); }
  }catch(e){ setSync(getQueue().length?'err':''); }
}

/* ---- boot ---- */
function showApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  renderChips();
  document.getElementById('hideDone').checked=state.hideDone;
  loadCache(); render(); refresh();
}
function bindApp(){
  document.getElementById('qaAdd').onclick=doQuickAdd;
  document.getElementById('qaInput').addEventListener('keydown',e=>{ if(e.key==='Enter') doQuickAdd(); });
  document.getElementById('refreshBtn').onclick=()=>refresh();
  document.getElementById('settingsBtn').onclick=openSettings;
  document.getElementById('hideDone').onchange=(e)=>{ state.hideDone=e.target.checked; localStorage.setItem(LS.hide,state.hideDone?'1':'0'); render(); };
  window.addEventListener('online',()=>refresh(true));
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden) refresh(true); });
  // click empty space -> deselect
  document.getElementById('app').addEventListener('click', e=>{
    if(!e.target.closest('.task') && !e.target.closest('.scrim') && !e.target.closest('.toast')) clearSelection();
  });
  // keyboard: Tab/Shift+Tab indent/outdent, Esc clear, Enter edit
  document.addEventListener('keydown', e=>{
    if(document.getElementById('modalRoot').children.length) return;
    const tag=(e.target.tagName||'').toUpperCase();
    if(tag==='INPUT'||tag==='TEXTAREA'||e.target.isContentEditable) return;
    if(!state.selected.size) return;
    if(e.key==='Tab'){ e.preventDefault(); e.shiftKey?outdentSelected():indentSelected(); }
    else if(e.key==='Escape'){ clearSelection(); }
    else if(e.key==='Enter'){ const t=task(state.anchor||[...state.selected][0]); if(t){ e.preventDefault(); openEdit(t); } }
  });
}
document.getElementById('loginForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const pass=document.getElementById('cfgPass').value;
  const hint=document.getElementById('loginHint');
  if(!pass){ hint.textContent='Enter your password.'; return; }
  state.pass=pass; hint.textContent='Checking…';
  try{
    const data=await api('list', {});
    if(data && data.error==='auth'){ hint.textContent='Wrong password. Try again.'; return; }
    localStorage.setItem(LS.pass, pass); showApp();
  }catch(err){ hint.textContent='Could not reach the server. Reload and try again.'; }
});
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
(function init(){ bindApp(); if(!REQUIRE_PASS || state.pass){ showApp(); } })();
</script>
